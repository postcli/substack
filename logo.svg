<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="384" height="384" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="48" height="48" fill="#0d1117"/>

  <!-- Monitor outer frame -->
  <rect x="4" y="3" width="34" height="24" rx="0" fill="#30363d"/>
  <rect x="5" y="4" width="32" height="22" fill="#21262d"/>

  <!-- Screen -->
  <rect x="7" y="6" width="28" height="17" fill="#0d1117"/>

  <!-- Screen inner border glow -->
  <rect x="7" y="6" width="28" height="1" fill="#161b22"/>
  <rect x="7" y="6" width="1" height="17" fill="#161b22"/>
  <rect x="34" y="6" width="1" height="17" fill="#0a0e13"/>
  <rect x="7" y="22" width="28" height="1" fill="#0a0e13"/>

  <!-- Monitor stand neck -->
  <rect x="17" y="27" width="8" height="3" fill="#21262d"/>
  <rect x="18" y="27" width="6" height="3" fill="#30363d"/>

  <!-- Monitor stand base -->
  <rect x="13" y="30" width="16" height="2" fill="#30363d"/>
  <rect x="14" y="30" width="14" height="1" fill="#3d444d"/>

  <!-- Power LED -->
  <rect x="20" y="25" width="2" height="1" fill="#3b82f6"/>

  <!-- === Screen content === -->

  <!-- Line numbers gutter -->
  <rect x="8" y="8" width="2" height="1" fill="#484f58"/>
  <rect x="8" y="10" width="2" height="1" fill="#484f58"/>
  <rect x="8" y="12" width="2" height="1" fill="#484f58"/>
  <rect x="8" y="14" width="2" height="1" fill="#484f58"/>
  <rect x="8" y="16" width="2" height="1" fill="#484f58"/>
  <rect x="8" y="18" width="2" height="1" fill="#484f58"/>
  <rect x="8" y="20" width="2" height="1" fill="#484f58"/>

  <!-- Code line 1: keyword + text -->
  <rect x="11" y="8" width="4" height="1" fill="#ff7b72"/>
  <rect x="16" y="8" width="8" height="1" fill="#c9d1d9"/>

  <!-- Code line 2: string -->
  <rect x="11" y="10" width="3" height="1" fill="#c9d1d9"/>
  <rect x="15" y="10" width="10" height="1" fill="#a5d6ff"/>

  <!-- Code line 3: function -->
  <rect x="11" y="12" width="5" height="1" fill="#d2a8ff"/>
  <rect x="17" y="12" width="6" height="1" fill="#c9d1d9"/>

  <!-- Code line 4: comment -->
  <rect x="11" y="14" width="12" height="1" fill="#8b949e"/>

  <!-- Code line 5: active line highlight + publish command -->
  <rect x="7" y="16" width="28" height="1" fill="#161b22"/>
  <rect x="11" y="16" width="2" height="1" fill="#3b82f6"/>
  <rect x="14" y="16" width="7" height="1" fill="#7ee787"/>

  <!-- Cursor on active line -->
  <rect x="22" y="16" width="1" height="1" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Code line 6 -->
  <rect x="11" y="18" width="9" height="1" fill="#c9d1d9"/>

  <!-- Code line 7 -->
  <rect x="11" y="20" width="6" height="1" fill="#ffa657"/>

  <!-- === Quill feather === -->

  <!-- Nib (pen tip) -->
  <rect x="30" y="22" width="1" height="1" fill="#92400e"/>
  <rect x="31" y="21" width="1" height="1" fill="#b45309"/>
  <rect x="31" y="22" width="1" height="1" fill="#78350f"/>

  <!-- Shaft -->
  <rect x="32" y="20" width="1" height="1" fill="#d97706"/>
  <rect x="33" y="19" width="1" height="1" fill="#d97706"/>
  <rect x="34" y="18" width="1" height="1" fill="#eab308"/>
  <rect x="35" y="17" width="1" height="1" fill="#eab308"/>
  <rect x="36" y="16" width="1" height="1" fill="#eab308"/>
  <rect x="37" y="15" width="1" height="1" fill="#f59e0b"/>
  <rect x="38" y="14" width="1" height="1" fill="#f59e0b"/>
  <rect x="39" y="13" width="1" height="1" fill="#f59e0b"/>
  <rect x="40" y="12" width="1" height="1" fill="#fbbf24"/>
  <rect x="41" y="11" width="1" height="1" fill="#fbbf24"/>
  <rect x="42" y="10" width="1" height="1" fill="#fbbf24"/>

  <!-- Feather vanes left -->
  <rect x="34" y="17" width="1" height="1" fill="#fbbf24"/>
  <rect x="35" y="16" width="1" height="1" fill="#fbbf24"/>
  <rect x="36" y="15" width="1" height="1" fill="#fcd34d"/>
  <rect x="37" y="14" width="1" height="1" fill="#fcd34d"/>
  <rect x="38" y="13" width="1" height="1" fill="#fde68a"/>
  <rect x="39" y="12" width="1" height="1" fill="#fde68a"/>
  <rect x="40" y="11" width="1" height="1" fill="#fef3c7"/>
  <rect x="41" y="10" width="1" height="1" fill="#fef3c7"/>
  <rect x="33" y="18" width="1" height="1" fill="#fbbf24"/>
  <rect x="35" y="15" width="1" height="1" fill="#fcd34d"/>
  <rect x="37" y="13" width="1" height="1" fill="#fde68a"/>
  <rect x="39" y="11" width="1" height="1" fill="#fef3c7"/>
  <rect x="40" y="10" width="1" height="1" fill="#fef9c3"/>

  <!-- Feather vanes right -->
  <rect x="36" y="17" width="1" height="1" fill="#fbbf24"/>
  <rect x="37" y="16" width="1" height="1" fill="#fcd34d"/>
  <rect x="38" y="15" width="1" height="1" fill="#fcd34d"/>
  <rect x="39" y="14" width="1" height="1" fill="#fde68a"/>
  <rect x="40" y="13" width="1" height="1" fill="#fde68a"/>
  <rect x="41" y="12" width="1" height="1" fill="#fef3c7"/>
  <rect x="42" y="11" width="1" height="1" fill="#fef3c7"/>
  <rect x="43" y="10" width="1" height="1" fill="#fef9c3"/>
  <rect x="43" y="11" width="1" height="1" fill="#fef9c3"/>
  <rect x="42" y="9" width="1" height="1" fill="#fef9c3"/>
  <rect x="43" y="9" width="1" height="1" fill="#fffbeb"/>
  <rect x="44" y="9" width="1" height="1" fill="#fffbeb"/>
  <rect x="44" y="10" width="1" height="1" fill="#fffbeb"/>

  <!-- Feather tip (top) -->
  <rect x="43" y="8" width="1" height="1" fill="#fffbeb"/>
  <rect x="44" y="8" width="1" height="1" fill="#fffbeb"/>

  <!-- Ink splatter -->
  <rect x="29" y="23" width="1" height="1" fill="#3b82f6"/>
  <rect x="28" y="24" width="1" height="1" fill="#2563eb"/>
  <rect x="30" y="24" width="1" height="1" fill="#1d4ed8"/>
  <rect x="29" y="24" width="1" height="1" fill="#3b82f6"/>
  <rect x="27" y="23" width="1" height="1" fill="#1d4ed8"/>

  <!-- Desk surface -->
  <rect x="0" y="32" width="48" height="1" fill="#21262d"/>

  <!-- Keyboard -->
  <rect x="4" y="34" width="20" height="5" fill="#21262d"/>
  <rect x="5" y="35" width="18" height="3" fill="#30363d"/>
  <!-- Key rows -->
  <rect x="6" y="35" width="2" height="1" fill="#3d444d"/>
  <rect x="9" y="35" width="2" height="1" fill="#3d444d"/>
  <rect x="12" y="35" width="2" height="1" fill="#3d444d"/>
  <rect x="15" y="35" width="2" height="1" fill="#3d444d"/>
  <rect x="18" y="35" width="3" height="1" fill="#3d444d"/>
  <rect x="6" y="37" width="3" height="1" fill="#3d444d"/>
  <rect x="10" y="37" width="8" height="1" fill="#3d444d"/>
  <rect x="19" y="37" width="3" height="1" fill="#3d444d"/>

  <!-- Coffee mug -->
  <rect x="36" y="33" width="5" height="6" fill="#30363d"/>
  <rect x="37" y="34" width="3" height="4" fill="#78350f"/>
  <!-- Mug handle -->
  <rect x="41" y="34" width="1" height="1" fill="#30363d"/>
  <rect x="42" y="34" width="1" height="3" fill="#30363d"/>
  <rect x="41" y="37" width="1" height="1" fill="#30363d"/>
  <!-- Steam -->
  <rect x="38" y="32" width="1" height="1" fill="#484f58">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="39" y="31" width="1" height="1" fill="#484f58">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Small plant pot -->
  <rect x="28" y="36" width="4" height="3" fill="#78350f"/>
  <rect x="29" y="35" width="2" height="1" fill="#22863a"/>
  <rect x="28" y="34" width="1" height="1" fill="#22863a"/>
  <rect x="31" y="34" width="1" height="1" fill="#22863a"/>
  <rect x="29" y="33" width="1" height="1" fill="#2ea043"/>
  <rect x="31" y="33" width="1" height="1" fill="#2ea043"/>
  <rect x="30" y="32" width="1" height="1" fill="#3fb950"/>
</svg>
